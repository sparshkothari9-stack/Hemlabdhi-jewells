<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0b070"/>
      <stop offset="50%" stop-color="#e8d5a3"/>
      <stop offset="100%" stop-color="#b8942e"/>
    </linearGradient>
  </defs>
  <g transform="translate(8,6)">
    <!-- Left upper wing -->
    <path d="M30,38 C25,28 10,18 5,22 C0,26 5,40 15,44 C18,45 22,46 30,42 Z" fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Right upper wing -->
    <path d="M30,38 C35,28 50,18 55,22 C60,26 55,40 45,44 C42,45 38,46 30,42 Z" fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Left lower wing -->
    <path d="M25,44 C18,46 8,52 8,58 C8,62 16,66 22,64 C26,62 30,56 30,50 Z" fill="url(#goldGrad)" opacity="0.7"/>
    <!-- Right lower wing -->
    <path d="M35,44 C42,46 52,52 52,58 C52,62 44,66 38,64 C34,62 30,56 30,50 Z" fill="url(#goldGrad)" opacity="0.7"/>
    <!-- Body -->
