    <!-- Antennae -->
    <path d="M30,32 C28,25 22,18 20,14" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M30,32 C32,25 38,18 40,14" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Wing dots -->
    <circle cx="16" cy="30" r="2" fill="white" opacity="0.5"/>
    <circle cx="44" cy="30" r="2" fill="white" opacity="0.5"/>
    <circle cx="14" cy="54" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="46" cy="54" r="1.5" fill="white" opacity="0.4"/>
  </g>
  <text x="75" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#1c1c1c" letter-spacing="2">Hem Labdhi Jewels</text>
  <text x="75" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="url(#goldGrad)" letter-spacing="4" font-weight="600">by Pavan Art</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="7" fill="#999" letter-spacing="4">LUXURY REDEFINED</text>
